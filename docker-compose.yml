services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: leadgen-postgres
    environment:
      POSTGRES_USER: leadgen_user
      POSTGRES_PASSWORD: leadgen_password
      POSTGRES_DB: leadgen_db
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8"
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U leadgen_user"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - leadgen-network

  # Redis Cache & Message Broker
  redis:
    image: redis:7-alpine
    container_name: leadgen-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - leadgen-network

  # Backend API (FastAPI)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: leadgen-backend
    ports:
      - "8001:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\" || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 30s
    environment:
      - ENVIRONMENT=development
      - DEBUG=True
      - SECRET_KEY=dev-secret-key-change-in-production
      - DATABASE_URL=postgresql+asyncpg://leadgen_user:leadgen_password@postgres:5432/leadgen_db
      - DATABASE_URL_SYNC=postgresql://leadgen_user:leadgen_password@postgres:5432/leadgen_db
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - CORS_ORIGINS=http://localhost:3000,http://localhost:3001,http://localhost:4000
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - leadgen-network
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # Celery Worker (Background Tasks)
  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: leadgen-celery-worker
    environment:
      - ENVIRONMENT=development
      - DEBUG=True
      - SECRET_KEY=dev-secret-key-change-in-production
      - DATABASE_URL=postgresql+asyncpg://leadgen_user:leadgen_password@postgres:5432/leadgen_db
      - DATABASE_URL_SYNC=postgresql://leadgen_user:leadgen_password@postgres:5432/leadgen_db
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - CORS_ORIGINS=http://localhost:3000
    volumes:
      - ./backend:/app
    depends_on:
      - postgres
      - redis
      - backend
    networks:
      - leadgen-network
    command: celery -A app.queue.celery_app worker -Q search_queue,celery --loglevel=info --concurrency=6

  # Frontend (Next.js 14)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        APP_VERSION: ${APP_VERSION:-0.1.0}
        GIT_SHA: ${GIT_SHA:-local}
        BUILD_TIME: ${BUILD_TIME:-unknown}
    container_name: leadgen-frontend
    ports:
      - "4000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=/api/v1
      - INTERNAL_BACKEND_ORIGIN=http://backend:8000
      - BACKEND_HOSTNAME=backend
      - BACKEND_PORT=8000
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - leadgen-network

  # Hyvor Relay - Email Server (SMTP + API)
  hyvor-relay:
    image: hyvor/relay:latest
    container_name: leadgen-hyvor-relay
    restart: unless-stopped
    ports:
      - "8025:25"      # SMTP (external access for testing)
      - "8587:587"     # SMTP TLS (external access)
    expose:
      - "8000"         # API (internal Docker network only)
    environment:
      - APP_URL=${HYVOR_APP_URL:-http://localhost:8000}
      - APP_KEY=${HYVOR_APP_KEY:-change-me-in-production-32chars}
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=leadgen_db
      - DB_USERNAME=leadgen_user
      - DB_PASSWORD=leadgen_password
      - OIDC_CLIENT_ID=${HYVOR_OIDC_CLIENT_ID:-}
      - OIDC_CLIENT_SECRET=${HYVOR_OIDC_CLIENT_SECRET:-}
      - OIDC_ISSUER=${HYVOR_OIDC_ISSUER:-}
    volumes:
      - hyvor_relay_data:/var/lib/relay
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - leadgen-network

volumes:
  postgres_data:
  redis_data:
  hyvor_relay_data:

networks:
  leadgen-network:
    driver: bridge
