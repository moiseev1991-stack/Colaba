# Coolify: builds from source, uses defaults for image names.
# GitHub Actions deploy: sets BACKEND_IMAGE, FRONTEND_IMAGE, IMAGE_TAG (GHCR pull).
# Required: SECRET_KEY, POSTGRES_USER, POSTGRES_PASSWORD, POSTGRES_DB,
#   DATABASE_URL, DATABASE_URL_SYNC, NEXT_PUBLIC_API_URL, CORS_ORIGINS
#
# Порты 8001/3000 не пробрасываем — Coolify/Traefik маршрутизирует по сети.
# Иначе при деплое "port is already allocated".
# Traefik labels (вариант Б для /opt/colaba): для доступа по IP и sslip.io.
services:
  postgres:
    # pgvector/pgvector:pg16 = postgres:16 + расширение vector (нужно миграциям 015/016
    # для AI-эмбеддингов отзывов). Том данных совместим со стандартным postgres:16-alpine,
    # данные при смене образа не теряются.
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - leadgen-network

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    networks:
      - leadgen-network

  backend:
    image: ${BACKEND_IMAGE:-colaba-backend-local}:${IMAGE_TAG:-local}
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      ENVIRONMENT: production
      DEBUG: "False"
      SECRET_KEY: ${SECRET_KEY}
      DATABASE_URL: ${DATABASE_URL}
      DATABASE_URL_SYNC: ${DATABASE_URL_SYNC}
      REDIS_URL: ${REDIS_URL}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND}
      CORS_ORIGINS: ${CORS_ORIGINS}
      LOG_LEVEL: ${LOG_LEVEL}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      # ProxyAPI (https://proxyapi.ru) — российский шлюз к OpenAI.
      # Дефолт api.openai.com блокируется для RU IP; на проде ставим в .env
      # https://api.proxyapi.ru/openai/v1
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      REVIEWS_AI_SENTIMENT_ASSISTANT_NAME: ${REVIEWS_AI_SENTIMENT_ASSISTANT_NAME:-reviews_ai_sentiment}
      REVIEWS_AI_NAMING_ASSISTANT_NAME: ${REVIEWS_AI_NAMING_ASSISTANT_NAME:-reviews_ai_naming}
      # Блок 2 ТЗ 2026-06-02: юр.данные через DaData (free tier 10k/день).
      DADATA_API_KEY: ${DADATA_API_KEY:-}
      DADATA_SECRET_KEY: ${DADATA_SECRET_KEY:-}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL}
      OLLAMA_MODEL: ${OLLAMA_MODEL}
      YANDEX_XML_FOLDER_ID: ${YANDEX_XML_FOLDER_ID}
      YANDEX_XML_KEY: ${YANDEX_XML_KEY}
      USE_PROXY: ${USE_PROXY}
      PROXY_URL: ${PROXY_URL}
      PROXY_LIST: ${PROXY_LIST}
      # Maps providers — без ключа /api/v1/maps/health/providers вернёт no_api_key
      TWOGIS_API_KEY: ${TWOGIS_API_KEY:-}
      # Widget API ключ для бесплатного fallback на public-api.reviews.2gis.com.
      # Достаётся из DevTools на 2gis.ru (Network → reviews → key=...).
      TWOGIS_REVIEWS_PUBLIC_API_KEY: ${TWOGIS_REVIEWS_PUBLIC_API_KEY:-}
      TWOGIS_REVIEWS_PUBLIC_API_ENABLED: ${TWOGIS_REVIEWS_PUBLIC_API_ENABLED:-True}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - leadgen-network
      - coolify
    restart: unless-stopped
    labels:
      # Traefik: API и health на IP и домене бэкенда
      - "traefik.enable=true"
      - "traefik.http.routers.colaba-backend.rule=(Host(`88.210.53.183`) && (PathPrefix(`/api`) || Path(`/health`))) || Host(`cgckw04gkk0g8g0g8gcwk44w.88.210.53.183.sslip.io`)"
      - "traefik.http.routers.colaba-backend.entrypoints=http"
      - "traefik.http.routers.colaba-backend.priority=100"
      - "traefik.http.services.colaba-backend.loadbalancer.server.port=8000"
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2"

  celery-worker:
    image: ${BACKEND_IMAGE:-colaba-backend-local}:${IMAGE_TAG:-local}
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      ENVIRONMENT: production
      DEBUG: "False"
      SECRET_KEY: ${SECRET_KEY}
      DATABASE_URL: ${DATABASE_URL}
      DATABASE_URL_SYNC: ${DATABASE_URL_SYNC}
      REDIS_URL: ${REDIS_URL}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND}
      LOG_LEVEL: ${LOG_LEVEL}
      TWOGIS_API_KEY: ${TWOGIS_API_KEY:-}
      TWOGIS_REVIEWS_PUBLIC_API_KEY: ${TWOGIS_REVIEWS_PUBLIC_API_KEY:-}
      TWOGIS_REVIEWS_PUBLIC_API_ENABLED: ${TWOGIS_REVIEWS_PUBLIC_API_ENABLED:-True}
      # LLM для reviews_ai (sentiment + naming + embeddings) — через ProxyAPI.
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      REVIEWS_AI_SENTIMENT_ASSISTANT_NAME: ${REVIEWS_AI_SENTIMENT_ASSISTANT_NAME:-reviews_ai_sentiment}
      REVIEWS_AI_NAMING_ASSISTANT_NAME: ${REVIEWS_AI_NAMING_ASSISTANT_NAME:-reviews_ai_naming}
      # Блок 2 ТЗ 2026-06-02: юр.данные через DaData (free tier 10k/день).
      DADATA_API_KEY: ${DADATA_API_KEY:-}
      DADATA_SECRET_KEY: ${DADATA_SECRET_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    networks:
      - leadgen-network
    restart: unless-stopped
    # Очереди: celery (default), maps_ai (LLM-обработка отзывов — мостовые HTTP-ожидания,
    # высокий concurrency норм), maintenance (редкие cron-задачи).
    command: celery -A app.queue.celery_app worker --loglevel=info --concurrency=8 -Q celery,maps_ai,maintenance

  celery-worker-search:
    image: ${BACKEND_IMAGE:-colaba-backend-local}:${IMAGE_TAG:-local}
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      ENVIRONMENT: production
      DEBUG: "False"
      SECRET_KEY: ${SECRET_KEY}
      DATABASE_URL: ${DATABASE_URL}
      DATABASE_URL_SYNC: ${DATABASE_URL_SYNC}
      REDIS_URL: ${REDIS_URL}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND}
      LOG_LEVEL: ${LOG_LEVEL}
      TWOGIS_API_KEY: ${TWOGIS_API_KEY:-}
      TWOGIS_REVIEWS_PUBLIC_API_KEY: ${TWOGIS_REVIEWS_PUBLIC_API_KEY:-}
      TWOGIS_REVIEWS_PUBLIC_API_ENABLED: ${TWOGIS_REVIEWS_PUBLIC_API_ENABLED:-True}
      # Блок 2 ТЗ 2026-06-02: DaData (для enrich_company_legal-таски).
      DADATA_API_KEY: ${DADATA_API_KEY:-}
      DADATA_SECRET_KEY: ${DADATA_SECRET_KEY:-}
      # LLM для reviews_ai в search-worker (sentiment может дёргаться отсюда).
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    networks:
      - leadgen-network
    restart: unless-stopped
    # Тяжёлые HTTP-парсеры (поиск + карты + отзывы + HTML-парсер 2gis.ru/firm).
    # Низкий prefetch + concurrency=2 (для HTML-парсера 2GIS отдельный rate_limit
    # на самом таске — 20/m). Без отдельной очереди maps_2gis_html таски бы
    # копились в celery default-кью с большим concurrency и долбили 2GIS.
    command: celery -A app.queue.celery_app worker --loglevel=info --concurrency=2 --prefetch-multiplier=1 -Q search_queue,maps,maps_reviews,maps_2gis_html

  frontend:
    image: ${FRONTEND_IMAGE:-colaba-frontend-local}:${IMAGE_TAG:-local}
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api/v1}
      INTERNAL_BACKEND_ORIGIN: http://cgckw04gkk0g8g0g8gcwk44w.88.210.53.183.sslip.io
    depends_on:
      backend:
        condition: service_started
    networks:
      - leadgen-network
    restart: unless-stopped
    labels:
      # Traefik: маршрутизация через coolify-proxy (вариант Б — деплой из /opt/colaba)
      - "traefik.enable=true"
      - "traefik.http.routers.colaba-frontend.rule=Host(`88.210.53.183`) || Host(`ck4g0000k4okkw8ck4sko0ok.88.210.53.183.sslip.io`)"
      - "traefik.http.routers.colaba-frontend.entrypoints=http"
      - "traefik.http.routers.colaba-frontend.priority=1"
      - "traefik.http.services.colaba-frontend.loadbalancer.server.port=3000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"require('http').get('http://localhost:3000',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 90s

volumes:
  postgres_data:
  redis_data:

networks:
  leadgen-network:
    driver: bridge
  coolify:
    external: true