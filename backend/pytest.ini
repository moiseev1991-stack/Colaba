[pytest]
asyncio_mode = auto
# One event loop per session — required for SQLAlchemy async engine created at import time.
asyncio_default_fixture_loop_scope = session
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
filterwarnings =
    ignore::DeprecationWarning
    ignore::pytest.PytestConfigWarning
